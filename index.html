<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chúc Mừng 8/3 🌹</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --box-color: #ff5277; 
            --ribbon-color: #ffd700; 
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #ff9fb4);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; 
        }

        /* --- STICKER ĐỘNG TRÊN NỀN --- */
        .bg-sticker {
            position: absolute;
            bottom: -10vh; 
            z-index: 1; 
            opacity: 0; 
            animation: floatSticker linear infinite;
            filter: drop-shadow(0 5px 10px rgba(255,100,140,0.3));
        }

        @keyframes floatSticker {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.7; }
            33% { transform: translate(30px, -35vh) rotate(120deg) scale(1.1); }
            66% { transform: translate(-30px, -70vh) rotate(240deg) scale(1); }
            90% { opacity: 0.7; }
            100% { transform: translate(0, -110vh) rotate(360deg) scale(0.8); opacity: 0; }
        }

        /* --- HỘP QUÀ --- */
        .present-container {
            position: absolute;
            bottom: 12vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 130px;
            z-index: 10;
            cursor: pointer;
        }

        .bounce {
            position: relative;
            width: 100%;
            height: 100%;
            animation: bounce 2s infinite;
        }

        .box-body {
            position: absolute;
            bottom: 0;
            width: 150px;
            height: 110px;
            background: var(--box-color);
            border-radius: 10px;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1), 0 15px 30px rgba(255, 51, 102, 0.3);
        }

        .box-lid {
            position: absolute;
            top: 0;
            left: -5px;
            width: 160px;
            height: 35px;
            background: #ff3366;
            border-radius: 8px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
            transition: all 0.8s ease-in-out;
            transform-origin: bottom left;
            z-index: 2;
        }

        .ribbon-vertical {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 100%;
            background: var(--ribbon-color);
            box-shadow: inset -3px 0 5px rgba(0,0,0,0.1);
        }
        .ribbon-horizontal {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            height: 25px;
            background: var(--ribbon-color);
        }

        .click-text {
            position: absolute;
            bottom: -35px;
            width: 100%;
            text-align: center;
            color: #ff3366;
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 800;
            animation: pulse 1.5s infinite;
        }

        /* --- HIỆU ỨNG KHI MỞ QUÀ --- */
        .present-container.open .bounce { animation: none; }
        .present-container.open .box-lid {
            transform: translateY(-60px) translateX(-40px) rotate(-30deg);
            opacity: 0; 
        }
        .present-container.open .click-text { display: none; }

        /* --- TẤM THIỆP GLASSMORPHISM --- */
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85%;
            max-width: 420px; /* Chỉnh lại độ rộng cho giống ảnh của bạn */
            max-height: 85vh; 
            overflow-y: auto; 
            background: rgba(255, 255, 255, 0.85); /* Nền trắng mờ tinh tế */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            padding: 40px 30px; 
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 100, 140, 0.15);
            
            /* Ban đầu ẩn dưới hộp quà */
            transform: translate(-50%, 20vh) scale(0.1);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 20;
            pointer-events: none;
            box-sizing: border-box;
        }

        .card h1 {
            font-family: 'Dancing Script', cursive;
            color: #ea3c6c; /* Màu hồng đỏ giống ảnh */
            font-size: clamp(36px, 9vw, 45px);
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .card p {
            color: #555; 
            font-size: clamp(14px, 3.5vw, 16px);
            line-height: 1.6;
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        .card strong { color: #ea3c6c; }

        /* Vùng Sticker có ánh sáng mờ ảo ở phía sau */
        .sticker-glow {
            position: relative;
            display: inline-block;
            font-size: 28px;
            margin-top: 15px;
            z-index: 1;
        }

        /* Tạo quầng sáng (glow) đỏ/vàng phía sau cụm sticker */
        .sticker-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 50px;
            background: radial-gradient(circle, rgba(234, 60, 108, 0.4) 0%, rgba(255, 215, 0, 0.3) 40%, rgba(255,255,255,0) 70%);
            filter: blur(8px);
            z-index: -1;
            border-radius: 50%;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Khi hộp mở, thiệp bật lên */
        .present-container.open ~ .card {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .card::-webkit-scrollbar { width: 0px; background: transparent; }

        /* --- KEYFRAMES --- */
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="nhac-nen.mp3" loop></audio>

    <div class="bg-sticker" style="left: 10%; animation-duration: 12s; font-size: 28px;">🌸</div>
    <div class="bg-sticker" style="left: 25%; animation-duration: 15s; animation-delay: 2s; font-size: 35px;">💖</div>
    <div class="bg-sticker" style="left: 45%; animation-duration: 10s; animation-delay: 5s; font-size: 24px;">🌹</div>
    <div class="bg-sticker" style="left: 65%; animation-duration: 18s; animation-delay: 1s; font-size: 30px;">✨</div>
    <div class="bg-sticker" style="left: 80%; animation-duration: 14s; animation-delay: 4s; font-size: 32px;">🌻</div>
    <div class="bg-sticker" style="left: 90%; animation-duration: 11s; animation-delay: 7s; font-size: 26px;">🌸</div>
    <div class="bg-sticker" style="left: 15%; animation-duration: 16s; animation-delay: 8s; font-size: 20px;">✨</div>
    <div class="bg-sticker" style="left: 55%; animation-duration: 13s; animation-delay: 3s; font-size: 28px;">💖</div>

    <div class="present-container" id="giftBox">
        <div class="bounce">
            <div class="box-body">
                <div class="ribbon-vertical"></div>
            </div>
            <div class="box-lid">
                <div class="ribbon-horizontal"></div>
                <div class="ribbon-vertical"></div>
            </div>
        </div>
        <div class="click-text">MỞ QUÀ NÈ!</div>
    </div>

    <div class="card" id="giftCard">
        <h1>Happy Women's<br>Day!</h1>
        <p>Gửi đến bạn <strong>Trâm</strong>,</p>
        <p>Nhân ngày Quốc tế Phụ nữ 8/3, tui chúc bạn luôn xinh đẹp, rạng rỡ và ngập tràn hạnh phúc.</p>
        <p>Hãy luôn tự tin, yêu thương bản thân và luôn tỏa sáng theo cách riêng của mình nhé!</p>
        
        <div class="sticker-glow">
            🌹❤️✨
        </div>
    </div>

    <script>
        const giftBox = document.getElementById('giftBox');
        const bgMusic = document.getElementById('bgMusic');
        let isOpen = false;

        giftBox.addEventListener('click', () => {
            if (!isOpen) {
                giftBox.classList.add('open');
                fireConfetti();
                
                // Bật nhạc
                bgMusic.play();
                
                isOpen = true;
            }
        });

        // Hàm bắn pháo giấy
        function fireConfetti() {
            var duration = 3000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
